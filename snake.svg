<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="400" height="200" rx="20" fill="#0f172a"/>

  <!-- Glow Effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Center Circle -->
  <circle cx="200" cy="100" r="15" fill="#38bdf8" filter="url(#glow)" />

  <!-- Orbit 1 -->
  <circle r="6" fill="#22c55e" filter="url(#glow)">
    <animateMotion dur="6s" repeatCount="indefinite" 
      path="M 200 100 m -60,0 a 60,60 0 1,0 120,0 a 60,60 0 1,0 -120,0" />
  </circle>

  <!-- Orbit 2 -->
  <circle r="8" fill="#f43f5e" filter="url(#glow)">
    <animateMotion dur="10s" repeatCount="indefinite" 
      path="M 200 100 m -90,0 a 90,90 0 1,0 180,0 a 90,90 0 1,0 -180,0" />
  </circle>

  <!-- Orbit 3 -->
  <circle r="5" fill="#a855f7" filter="url(#glow)">
    <animateMotion dur="4s" repeatCount="indefinite" 
      path="M 200 100 m -40,0 a 40,40 0 1,0 80,0 a 40,40 0 1,0 -80,0" />
  </circle>

  <!-- Floating Text -->
  <text x="50%" y="180" text-anchor="middle" fill="#e2e8f0" font-size="16" font-family="Arial">
    Rahul Rajan • Developer
  </text>

</svg>
